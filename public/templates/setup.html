<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Setup Game</title>

  <link rel="shortcut icon" href="../background/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../css/pickr.min.css" />
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/setup.css" />
</head>

<body>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>

  <main class="app">
    <section class="setup-screen">
      <h1>TUG OF WAR: MATH GAME</h1>
      <h2 class="setup-title">SETUP GAME</h2>

      <section class="setup-card">
        <h3>Operations</h3>
        <p>Select one or more operations</p>

        <div class="operations">
          <label class="op-card selected">
            <input type="checkbox" value="+" checked />
            <span>+</span>
            <small>Addition</small>
          </label>

          <label class="op-card">
            <input type="checkbox" value="-" />
            <span>−</span>
            <small>Subtraction</small>
          </label>

          <label class="op-card">
            <input type="checkbox" value="*" />
            <span>×</span>
            <small>Multiplication</small>
          </label>

          <label class="op-card">
            <input type="checkbox" value="/" />
            <span>÷</span>
            <small>Division</small>
          </label>
        </div>

        <h3 style="margin-top: 35px;">Difficulty</h3>
        <p>Choose how hard the questions should be</p>

        <div class="difficulty">
          <button class="level active" data-level="easy">Easy</button>
          <button class="level" data-level="medium">Medium</button>
          <button class="level" data-level="hard">Hard</button>
        </div>
      </section>

      <section class="setup-card settings-card">
        <h3>Settings</h3>
        <p id="wifiIpText">Loading WiFi IP...</p>

        <div class="settings-row">
          <label>Font Family</label>
          <select id="fontFamilyBase"></select>
        </div>

        <div class="settings-row">
          <label>Font Style</label>
          <select id="fontStyleBase">
            <option value="normal">Normal</option>
            <option value="italic">Italic</option>
          </select>
        </div>

        <div class="settings-row">
          <label>Upload Font</label>
          <input id="fontUploader" type="file" accept=".ttf,.otf,.woff,.woff2" multiple />
        </div>

        <div id="fontGrid" class="font-grid"></div>

        <h3 style="margin-top: 28px;">Colors</h3>
        <div id="colorPickersContainer" class="settings-grid"></div>

        <button id="saveSettingsBtn" class="start" type="button">SAVE SETTINGS</button>
      </section>

      <div class="setup-actions">
        <button id="nextBtn" class="start">NEXT</button>
      </div>
    </section>
  </main>

  <div id="customPopup" class="popup hidden">
    <div class="popup-card">
      <div class="popup-icon">🎉</div>
      <h3 id="popupTitle">Success</h3>
      <p id="popupMessage">Settings saved</p>
      <button id="popupCloseBtn">OK</button>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="../js/pickr.min.js"></script>
  <script src="../js/setup.js"></script>
  <script>
    if (window.io) {
      const socket = io();

      socket.on("reload-client", () => {
        location.reload();
      });
    }
  </script>
</body>
</html>
